# Design Decision Studies — Hyperparameter Screening (5 epochs)
# ============================================================

OPT-SGD:
  model: model_eq
  optimizer: sgd
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0001
  loss: ce
  augmentation: false
  epochs: 5

